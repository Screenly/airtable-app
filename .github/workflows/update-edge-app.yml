---
name: Update Edge App

on:
  push:
    branches:
      - development
      - main

run-name: Updating Airtable App in ${{ github.ref == 'refs/heads/main' && 'production' || 'stage' }}

jobs:
  deploy-stage:
    name: Updating Airtable App in stage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'
    environment: stage
    steps:
      - uses: actions/checkout@v6
      # TODO: Refactor into Screenly/edge-apps-actions/whoami@v1
      # See https://github.com/Screenly/edge-apps-actions/issues/8
      - name: Screenly API whoami
        env:
          SCREENLY_API_TOKEN: ${{ secrets.SCREENLY_API_TOKEN }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail
          current_user=$(
            curl -fsSL -H "Authorization: Token ${SCREENLY_API_TOKEN}" \
              "${API_BASE_URL}/api/v4.1/users" \
              | jq -r '.[0] | "\(.first_name) \(.last_name) <\(.email)>"'
          )
          echo "Current user: ${current_user}"
          current_team=$(
            curl -fsSL -H "Authorization: Token ${SCREENLY_API_TOKEN}" \
              "${API_BASE_URL}/api/v4.1/teams" \
              | jq -r '.[] | select(.is_current == true)
                      | "\(.name) (\(.domain))"'
          )
          echo "Current team: ${current_team}"
      - uses: Screenly/edge-apps-actions/update@v1
        with:
          screenly_api_token: ${{ secrets.SCREENLY_API_TOKEN }}
          environment: stage
          delete_missing_settings: 'true'

  deploy-production:
    name: Updating Airtable App in production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v6
      # TODO: Refactor into Screenly/edge-apps-actions/whoami@v1
      # See https://github.com/Screenly/edge-apps-actions/issues/8
      - name: Screenly API whoami
        env:
          SCREENLY_API_TOKEN: ${{ secrets.SCREENLY_API_TOKEN }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail
          current_user=$(
            curl -fsSL -H "Authorization: Token ${SCREENLY_API_TOKEN}" \
              "${API_BASE_URL}/api/v4.1/users" \
              | jq -r '.[0] | "\(.first_name) \(.last_name) <\(.email)>"'
          )
          echo "Current user: ${current_user}"
          current_team=$(
            curl -fsSL -H "Authorization: Token ${SCREENLY_API_TOKEN}" \
              "${API_BASE_URL}/api/v4.1/teams" \
              | jq -r '.[] | select(.is_current == true)
                      | "\(.name) (\(.domain))"'
          )
          echo "Current team: ${current_team}"
      - uses: Screenly/edge-apps-actions/update@v1
        with:
          screenly_api_token: ${{ secrets.SCREENLY_API_TOKEN }}
          environment: production
          delete_missing_settings: 'true'
