---
name: Initialize Edge App

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment for initialization
        required: true
        default: stage
        type: choice
        options:
          - stage
          - production
      edge_app_name:
        description: Edge App name (used for the CLI --name flag)
        required: true
        type: string
      edge_app_title:
        description: Display title for the Edge App instance
        required: true
        type: string

run-name: Initializing ${{ inputs.edge_app_name }} in ${{ inputs.environment }}

jobs:
  initialize:
    name: Initializing ${{ inputs.edge_app_name }} in ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.environment == 'production' && 'main' || 'development' }}
      # TODO: Refactor into Screenly/edge-apps-actions/whoami@v1
      # See https://github.com/Screenly/edge-apps-actions/issues/8
      - name: Screenly API whoami
        env:
          SCREENLY_API_TOKEN: ${{ secrets.SCREENLY_API_TOKEN }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          set -euo pipefail
          current_user=$(
            curl -fsSL -H "Authorization: Token ${SCREENLY_API_TOKEN}" \
              "${API_BASE_URL}/api/v4.1/users" \
              | jq -r '.[0] | "\(.first_name) \(.last_name) <\(.email)>"'
          )
          echo "Current User: ${current_user}"
          current_team=$(
            curl -fsSL -H "Authorization: Token ${SCREENLY_API_TOKEN}" \
              "${API_BASE_URL}/api/v4.1/teams" \
              | jq -r '.[] | select(.is_current == true)
                      | "\(.name) (\(.domain))"'
          )
          echo "Current Team: ${current_team}"
      - uses: Screenly/edge-apps-actions/initialize@v1
        with:
          screenly_api_token: ${{ secrets.SCREENLY_API_TOKEN }}
          edge_app_name: ${{ inputs.edge_app_name }}
          edge_app_title: ${{ inputs.edge_app_title }}
          environment: ${{ inputs.environment }}
